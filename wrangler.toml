name = "aiforedu"
main = "./dist/_worker.js/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "aiforedu.ai/*", zone_name = "aiforedu.ai" },
  { pattern = "www.aiforedu.ai/*", zone_name = "aiforedu.ai" }
]

[assets]
directory = "./dist"
run_worker_first = ["/api/*"]

[vars]
SITE_URL = "https://aiforedu.ai"

# Set these via Cloudflare Dashboard → Pages → Environment variables (secrets)
# BEEHIIV_PUBLICATION_ID = ""
# LEMON_SQUEEZY_STORE_ID = ""
# TURNSTILE_SECRET_KEY = ""
# CONTACT_WEBHOOK_URL = ""

# Uncomment and configure if Cloudflare adapter sessions are enabled in production.
# [[kv_namespaces]]
# binding = "SESSION"
# id = "your-session-kv-id"

[[d1_databases]]
binding = "DB"
database_name = "aiforedu-db"
database_id = "2a62322b-382c-4c11-98fc-c8a13d496533"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "aiforedu-assets"
