name = "aiforedu"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"

[vars]
SITE_URL = "https://aiforedu.ai"

# Uncomment and fill these after creating the services:
# BEEHIIV_PUBLICATION_ID = ""
# LEMON_SQUEEZY_STORE_ID = ""
# TURNSTILE_SECRET_KEY = ""

# Uncomment after running: wrangler d1 create aiforedu-db
# [[d1_databases]]
# binding = "DB"
# database_name = "aiforedu-db"
# database_id = "PASTE_YOUR_ID_HERE"

# Uncomment after enabling R2 in Cloudflare Dashboard
# [[r2_buckets]]
# binding = "ASSETS"
# bucket_name = "aiforedu-assets"
