name = "aiforedu"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist"

[vars]
SITE_URL = "https://aiforedu.ai"
BEEHIIV_PUBLICATION_ID = ""  # Add your Beehiiv publication ID
LEMON_SQUEEZY_STORE_ID = ""  # Add your LemonSqueezy store ID
TURNSTILE_SECRET_KEY = ""    # Add your Turnstile secret key

[[d1_databases]]
binding = "DB"
database_name = "aiforedu-db"
database_id = ""  # Add your D1 database ID after creating it

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "aiforedu-assets"
